<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 2</title>
</head>
<body>
    <label for=""> Idade </label>
    <input type ="text" id="inp_idade" placeholder="Digite a sua idade">
    <button onclick="mostrar_idade()">Clicar</button>

    <p id="resultado"</p> 
    <script>
        function mostrar_idade(){
            let idade = document.getElementById("inp_idade"). value

            document.getElementById("resultado").textContent = `A sua idade é ${idade}`





        }
    </script>
</body>

</html>
