<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <label for="inp_idade">Idade:</label>
    <input type="number" id="inp_idade" placeholder="Digite sua idade">

    <button onclick="mostrar_info()">Clicar</button>

    <p id="resultado"></p>

    <script>
        function mostrar_info(){
            
            let idade = document.getElementById("inp_idade").value;

            if (idade >= 18){
                document.getElementById("resultado").textContent = "Você é maior de idade";
            } 
            else {
                document.getElementById("resultado").textContent = "Você é menor de idade";
            }
        }
    </script>
</body>
</html>
